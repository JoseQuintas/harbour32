name: Harbour 3.2 mingw last

on:
  push:
  schedule:
   - cron: "0 1 1 * *"
  workflow_dispatch:
    inputs:
      name:
        description: 'Harbour 3.2 last'
        default: 'hb32_last'
        required: true

jobs:

  Build:
    runs-on: windows-latest
    steps:

    - name: Install Source Code
      env:
         REPO: ${{ github.repository }}
      run: |
         c:
         cd \temp
         git clone https://github.com/$env:repo c:\temp\harbour32 --depth 20
         cd \temp\harbour32
         git config user.email "you@example.com"
         git config user.name "Your Name"
         git pull https://github.com/harbour/core

    - name: Build 32 bits
      env:
         HB_BUILD_STRIP: all
         HB_COMPILER: mingw
         HB_INSTALL_PREFIX: c:\temp\harbour
         PATH: c:\msys64\mingw32\bin
      run: |
         c:
         cd c:\temp\harbour32
         mingw32-make clean install

    - name: Build 64 bits
      env:
         HB_BUILD_STRIP: all
         HB_COMPILER: mingw64
         HB_INSTALL_PREFIX: c:\temp\harbour
         PATH: c:\msys64\mingw64\bin
      run: |
         c:
         cd \temp\harbour32
         mingw32-make clean install

    - name: Zip
      env:
         PATH: c:\program files\7-zip
      run: |
         c:
         cd \temp\harbour
         7z a -r c:\temp\hb32_last.7z c:\temp\harbour\*.* -xr'!.git' -xr'!.github' -xr'!.hbmk'

    - name: Save
      uses: actions/upload-artifact@v2
      with:
         name: hb32_last
         path: c:\temp\hb32_last.7z
